  <section class="hero">
    <div class="title">
      <img src="./assets/img/logo.png" alt="">
    </div>
    <div class="slider-wrapper">
      <div class="slider">
        <img src="./assets/img/heroimages1.jpg" alt="" id="slide-1">
        <img src="./assets/img/heroimages2.jpg" alt="" id="slide-2">
        <img src="./assets/img/heroimages3.jpg" alt="" id="slide-3">
      </div>
      <div class="slider-nav">
        <a href="#slide-1"></a>
        <a href="#slide-2"></a>
        <a href="#slide-3"></a>
      </div>
    </div>
    <div class="booking_box">
      <div class="booking_box-container">
        <div class="booking-title">
          Info Pemesanan
        </div>
        <ul class="booking-box_item">
          <li class="booking_list-link">
            <span class="input-title">
              Nama
            </span>
            <input type="text" placeholder="Nama Anda Tuan" class="input-box">
          </li>
          <li class="booking_list-link">
            <span class="input-title">
              No Whatsapp
            </span>
            <input type="text" placeholder="Info Nomor Tuan" class="input-box">
          </li>
          <li class="booking_list-link">
            <label for="busses" class="select-title">
              Pilihan Armada
            </label>
            <select name="busses" id="busses" class="input-box">
              <option value="Hiace">Hiace 16 Seat</option>
              <option value="Hiace">Medium 40 Seat</option>
              <option value="Hiace">Medium 28 Seat</option>
              <option value="Hiace">Bigbus 50 Seat</option>
              <option value="Hiace">Bigbus 60 Seat</option>
            </select>
          </li>
          <li class="booking_list-link">
            <label for="destination" class="select-title">
              Tujuan Anda
            </label>
            <select name="destination" id="destination" class="input-box">
              <option value="Hiace">Bali</option>
              <option value="Hiace">Yogyakarta</option>
              <option value="Hiace">Malang</option>
              <option value="Hiace">Jakarta</option>
              <option value="Hiace">Luar Pulau</option>
            </select>
          </li>
        </ul>
        <div class="sand_box">
          <a href="">
            Kirim Permintaan
          </a>
        </div>
